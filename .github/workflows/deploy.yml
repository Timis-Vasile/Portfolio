name: Deploy mystaticsite

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # <--- Aggiornato a Node 20!

      - name: Install dependencies
        run: npm i

      - name: Build website
        run: npm run build

      - name: Deploy pages
        uses: peaceiris/actions-gh-pages@v4 # Versione aggiornata e stabile
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs # Prende la cartella dei file statici
